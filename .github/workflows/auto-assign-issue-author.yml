name: Auto Assign Issue Author

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  issues: write

jobs:
  assign-author:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to author
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const assignees = (issue.assignees || []).map((a) => a.login);

            if (issue.user.type === "Bot") {
              core.info(`Skipping bot author: ${author}`);
              return;
            }

            if (assignees.includes(author)) {
              core.info(`Issue #${issue.number} is already assigned to ${author}`);
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [author],
              });
              core.info(`Assigned issue #${issue.number} to ${author}`);
            } catch (error) {
              core.warning(
                `Could not assign issue #${issue.number} to ${author}: ${error.message}`
              );
            }
